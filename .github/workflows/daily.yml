name: Generate daily brief

on:
  schedule:
    - cron: "17 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate brief
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || 'grok-4.3' }}
          TZ: Asia/Tokyo
        run: python scripts/daily_signal.py
      - name: Commit new content
        run: |
          if git diff --quiet -- content/daily data/seen.json; then
            echo "No new content"
            exit 0
          fi
          git config user.name "daily-signal[bot]"
          git config user.email "daily-signal[bot]@users.noreply.github.com"
          git add content/daily data/seen.json
          git commit -m "content: publish daily brief $(date +%F)"
          git push

