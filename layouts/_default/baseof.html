<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
  <link rel="alternate" type="application/rss+xml" href="{{ "index.xml" | relURL }}" title="{{ site.Title }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ "" | relURL }}">Daily Signal</a>
    <nav aria-label="メインナビゲーション">
      <a href="{{ "daily/" | relURL }}">Daily</a>
      <a href="{{ "categories/" | relURL }}">Categories</a>
      <a href="{{ "tags/" | relURL }}">Tags</a>
      <a href="{{ "index.xml" | relURL }}">RSS</a>
    </nav>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
  <footer>
    <span>Sources first. Summaries second.</span>
    <a href="{{ site.Params.github }}">GitHub</a>
  </footer>
</body>
</html>
