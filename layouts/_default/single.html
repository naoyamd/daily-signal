{{ define "main" }}
<article class="article">
  <header>
    <p class="eyebrow">{{ with index .Params.categories 0 }}{{ . }}{{ else }}BRIEF{{ end }}</p>
    <h1>{{ .Title }}</h1>
    <div class="meta"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time><span>·</span><span>{{ .ReadingTime }} min read</span></div>
    {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
  </header>
  <div class="prose">{{ .Content }}</div>
  {{ with .Params.tags }}<div class="tags">{{ range . }}<a href="{{ (printf "tags/%s/" (. | urlize)) | relURL }}">#{{ . }}</a>{{ end }}</div>{{ end }}
</article>
{{ end }}
