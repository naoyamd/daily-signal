{{ define "main" }}
<section class="hero">
  <p class="eyebrow">CURATED DAILY</p>
  <h1>情報の量ではなく、<br>意味のある信号を。</h1>
  <p>{{ site.Params.description }}</p>
</section>
<section class="feed">
  <div class="section-heading"><h2>Latest briefs</h2><a href="{{ "daily/" | relURL }}">すべて見る →</a></div>
  <div class="cards">
    {{ range first 12 (where site.RegularPages "Section" "daily") }}
      {{ partial "card.html" . }}
    {{ else }}
      <p class="empty">最初のダイジェストを準備中です。</p>
    {{ end }}
  </div>
</section>
{{ end }}
